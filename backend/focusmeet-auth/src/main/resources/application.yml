spring:
  application:
    name: focusmeet-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/focusmeet}
    username: ${DB_USER:focusmeet}
    password: ${DB_PASS:focusmeet_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8080
  servlet:
    context-path: /

# ── Application-level config ───────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:focusmeet-default-dev-secret-change-in-production-min32chars}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

# ── AI Service ─────────────────────────────────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.focusmeet: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
